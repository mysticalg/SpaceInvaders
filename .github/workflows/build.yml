name: Build and Deploy Galaxion Retro

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Least-privilege defaults; only elevate where required.
permissions:
  contents: read

# Avoid overlapping deploys for the same ref.
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required files exist
        run: |
          test -f index.html
          test -f styles.css
          test -f game.js
          test -f README.md

      - name: Prepare static site bundle
        run: |
          mkdir -p dist
          cp index.html styles.css game.js README.md dist/
          # Disable Jekyll processing so static assets are served as-is.
          touch dist/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    # Required for GitHub Pages deployment.
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
